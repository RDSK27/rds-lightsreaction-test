<script>
if('serviceWorker' in navigator){
  var swReg=null, swUpdating=false, swReloaded=false;
  navigator.serviceWorker.addEventListener('controllerchange', function(){
    if(swUpdating && !swReloaded){ swReloaded=true; window.location.reload(); }
  });
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js', {updateViaCache:'none'}).then(function(reg){
      swReg=reg;
      reg.addEventListener('updatefound', function(){
        var nw=reg.installing;
        if(!nw) return;
        nw.addEventListener('statechange', function(){
          if(nw.state==='installed' && navigator.serviceWorker.controller){
            swUpdating=true;
            nw.postMessage({action:'skipWaiting'});
          }
        });
      });
    }).catch(function(){});
  });
  document.addEventListener('visibilitychange', function(){
    if(document.visibilityState==='visible' && swReg){ swReg.update(); }
  });
}
</script>

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#FFFFFF;overflow:hidden;overscroll-behavior:none;}
  body{
    font-family:Arial,Helvetica,sans-serif;
    background:#FFFFFF;
    color:var(--negro);
    -webkit-user-select:none;user-select:none;
    touch-action:manipulation;
    position:fixed;top:0;left:0;width:100%;height:100%;overflow:hidden;overscroll-behavior:none;
  }
  .app{position:relative;max-width:560px;margin:0 auto;min-height:100svh;display:flex;flex-direction:column;background:#FFFFFF;}

  /* ---------- Header ---------- */
  header{ width:100%; flex-shrink:0; background:#111; border-bottom:4px solid #b03020; display:flex; flex-direction:column; align-items:center; padding:0; }
  header img{ width:100%; height:auto; display:block; margin-bottom:0; }
  .subtitle{ display:block; width:100%; box-sizing:border-box; font-size:0.58rem; letter-spacing:0.14em; color:#cfcfcf; text-transform:none; padding:8px 0 8px; text-align:center; background:linear-gradient(rgba(0,0,0,0.34),rgba(0,0,0,0.34)),var(--carbon); background-size:cover; background-position:center; }

  /* ---------- Cuerpo ---------- */
  main{flex:1;padding:8px 16px 4px;display:flex;flex-direction:column;gap:7px;gap:clamp(4px,1svh,9px);background:#FFFFFF;}

  .title{
    text-align:center;font-weight:700;letter-spacing:.5px;line-height:.97;
    font-size:clamp(24px,7vw,38px);color:var(--negro);text-transform:uppercase;
    margin:0;
  }

  .logo-wrap{display:flex;justify-content:center;padding:0;}
  .logo-wrap img{width:110px;width:min(30vw,110px,13svh);height:auto;display:block;}

  .group-label{
    text-align:center;color:var(--tx-gris);font-weight:700;
    letter-spacing:5px;font-size:11px;text-transform:uppercase;margin:0;
  }

  .segment{
    display:flex;border:2px solid var(--negro);border-radius:0;overflow:hidden;background:var(--seg);
  }
  .segment button{
    flex:1;border:0;background:var(--seg);color:var(--tx-seg);
    font-family:inherit;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
    font-size:15px;padding:10px 4px;padding:clamp(7px,1.4svh,12px) 4px;cursor:pointer;position:relative;
    border-right:2px solid var(--negro);
  }
  .segment button:last-child{border-right:0;}
  .segment button.sel{background:var(--rojo);color:#fff;}
  #segModo button{ font-size:13px; letter-spacing:0.3px; padding-left:2px; padding-right:2px; }
  #segEstimulo,#segEnsayos{margin-top:8px;}
  .seg-dim{ opacity:.4; pointer-events:none; }

  /* ---------- Acciones (mas pequenas y estrechas, como en la referencia) ---------- */
  .actions{display:flex;flex-direction:column;align-items:center;gap:6px;gap:clamp(4px,1svh,8px);margin-top:clamp(20px,4svh,40px);}

  .btn-ranking { width:75%; padding:9px; background:#fff; color:#b03020; border:2px solid #b03020; font-size:0.78rem; font-weight:900; letter-spacing:0.18em; text-transform:uppercase; cursor:pointer; text-align:center; border-radius:6px; transition:transform 0.12s; margin-top:0; }
  .btn-ranking:active{transform:translateY(3px);}


  footer{
    text-align:center;color:var(--tx-gris);font-weight:600;letter-spacing:2px;
    font-size:10px;text-transform:uppercase;padding:6px 12px 10px;
  }

  /* ===== Modo Libre: pantalla de seleccion ===== */
  #libre > .libre-main{
    flex:1; min-height:0; overflow-y:auto; display:flex; flex-direction:column; align-items:center;
    padding:10px 12px 16px; box-sizing:border-box;
    background-color:#c7cbcf;
    background-image:
      radial-gradient(70% 50% at 50% 30%,rgba(255,255,255,0.55) 0%,rgba(255,255,255,0) 60%),
      linear-gradient(180deg,#e4e7ea 0%,#c7cbcf 60%,#b0b4b8 100%);
  }
  .libre-title{ font-size:1.2rem; font-weight:900; letter-spacing:0.12em; text-transform:uppercase; color:#111; text-align:center; margin:6px 0 12px; }
  .libre-panel{
    width:100%; max-width:360px; box-sizing:border-box; margin:0 auto;
    padding:14px 14px 16px; display:flex; flex-direction:column; gap:10px;
    border:3px solid #b03020; border-radius:14px; background:#0a0a0a;
    box-shadow:0 4px 12px rgba(0,0,0,.45);
  }
  .libre-row{
    display:flex; align-items:center; justify-content:space-between; width:100%; box-sizing:border-box;
    padding:11px 14px; border:2px solid var(--negro); background:var(--seg); color:var(--tx-seg);
    font-family:inherit; cursor:pointer;
  }
  .libre-row .libre-k{ font-weight:700; letter-spacing:1.5px; text-transform:uppercase; font-size:14px; }
  .libre-row .libre-v{ font-weight:800; font-size:16px; }
  .libre-row.sel{ background:var(--rojo); color:#fff; border-color:var(--rojo); }
  .libre-rocker{
    display:flex; width:min(260px,86%); height:58px; margin:6px auto 2px;
    border-radius:14px; overflow:hidden; border:1px solid #3a3a3a;
    box-shadow:0 2px 6px rgba(0,0,0,.45);
  }
  .libre-rocker button{
    flex:1; border:0; cursor:pointer; font-family:inherit;
    font-size:30px; font-weight:700; line-height:1; color:#e6e6e6;
    background:#222222; transition:background .1s, color .1s;
  }
  .libre-rocker button:first-child{ border-right:1px solid #3a3a3a; }
  .libre-rocker button:active{ background:var(--rojo); color:#fff; }
  .libre-start{
    width:80%; max-width:240px; margin:8px auto 0; padding:12px; border:none; border-radius:10px; cursor:pointer;
    background:radial-gradient(circle at 35% 30%, #e84030 0%, #b03020 45%, #7a1a10 100%);
    color:#fff; font-weight:900; letter-spacing:0.18em; text-transform:uppercase; font-size:0.95rem;
    box-shadow:0 4px 10px rgba(0,0,0,.5), inset 0 2px 4px rgba(255,255,255,.28), inset 0 -3px 6px rgba(0,0,0,.5);
  }
  .libre-start:active{ transform:translateY(1px); }
  .libre-start.disabled{ opacity:.45; pointer-events:none; }

  /* ===== Multi-pantalla ===== */
  .screen{flex:1;display:none;flex-direction:column;min-height:0;}
  .screen.active{display:flex;}

  /* Fondo metalizado (acero pulido con halo) SOLO en la pantalla de inicio.
     Va en el <main> del home (no en #home) porque main{background:#fff} lo taparia.
     Sin franjas finas (repeating-linear-gradient): provocaban rayas verticales en tablet. */
  #home>main{
    background-color:#c7cbcf;
    background-image:
      radial-gradient(70% 50% at 50% 38%,rgba(255,255,255,0.55) 0%,rgba(255,255,255,0) 60%),
      linear-gradient(180deg,#e4e7ea 0%,#c7cbcf 60%,#b0b4b8 100%);
  }

  /* Navbar inferior Inicio / Repetir */
  .navbar{display:flex;gap:8px;padding:8px 14px calc(8px + env(safe-area-inset-bottom));background:#fff;}
  .nav-btn{flex:1;height:var(--ah);display:flex;align-items:center;justify-content:center;gap:8px;
    background:var(--rojo);color:#fff;border:0;border-radius:0;cursor:pointer;
    font-family:inherit;font-weight:700;letter-spacing:2px;text-transform:uppercase;font-size:14px;}
  .nav-btn svg{width:18px;height:18px;}
  .results-actions { display:flex; flex-direction:row; gap:0; width:100%; z-index:10; border-top:4px solid #b03020; margin-top:0; }
  .game-ctrl-btn { flex:1; padding:13px; background:#111; color:#fff; border:1px solid #333; border-right:none; font-size:0.82rem; font-weight:900; letter-spacing:0.12em; cursor:pointer; text-transform:uppercase; display:flex; align-items:center; justify-content:center; }
  .game-ctrl-btn:last-child { border-right:1px solid #ddd; }

  /* ----- Ejercicio ----- */
  .game-body{flex:1;display:flex;flex-direction:column;min-height:0;padding:8px 14px 11px;gap:7px;background:#fff;}
  .target-row{display:flex;align-items:center;justify-content:center;gap:14px;}
  .target-cap{font-weight:700;letter-spacing:1px;text-transform:uppercase;font-size:12px;color:var(--azul);text-align:left;line-height:1.1;}
  .target-wrap{display:flex;justify-content:center;}
  .target-box{width:72px;height:72px;border:0;display:flex;align-items:center;justify-content:center;background:#fff;flex:none;}
  .target-box svg{width:86%;height:86%;}

  .stats{display:flex;gap:8px;}
  .stat{flex:1;text-align:center;padding:2px;background:#fff;}
  .stat .k{font-weight:700;letter-spacing:1px;text-transform:uppercase;font-size:9px;color:#888;}
  .stat .v{font-weight:800;font-size:36px;line-height:1.05;color:var(--rojo);}
  .stat.main .v{color:var(--negro);}
  .substat{display:flex;justify-content:center;gap:16px;font-size:12px;color:#555;font-weight:600;}
  .substat b{color:var(--negro);}

  .prog-row{display:flex;align-items:center;gap:10px;}
  .trial-count{font-weight:800;font-size:15px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.8);white-space:nowrap;min-width:44px;}
  .progress{flex:1;height:9px;background:var(--seg);border:2px solid var(--borde);}
  .progress > i{display:block;height:100%;background:var(--rojo);width:0%;transition:width .12s linear;}

  /* --- Lights: pods rejilla 3x3 (LED) --- */
  .grid3 .pod{ position:relative; width:100%; aspect-ratio:1; border-radius:50%; box-sizing:border-box; padding:0; border:none; cursor:pointer; -webkit-tap-highlight-color:transparent; background:var(--ring); box-shadow:0 3px 7px rgba(0,0,0,.5); transition: box-shadow .06s ease, transform .06s ease; }
  .grid3 .pod::before{ content:''; position:absolute; inset:4px; border-radius:50%; background:radial-gradient(circle at 35% 30%, #3a3a3a 0%, #1a1a1a 50%, #050505 100%); box-shadow:inset 0 2px 4px rgba(255,255,255,.22), inset 0 -3px 6px rgba(0,0,0,.6); transition: background .05s ease, box-shadow .05s ease; }
  .grid3 .pod.lit{ box-shadow:0 3px 7px rgba(0,0,0,.5); }
  .grid3 .pod.lit::before{ background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.30) 0%, rgba(255,255,255,0) 46%), radial-gradient(circle at 50% 82%, rgba(0,0,0,.40) 0%, rgba(0,0,0,0) 58%), var(--pod-color,#e23b2e); box-shadow:inset 0 2px 4px rgba(255,255,255,.28), inset 0 -3px 6px rgba(0,0,0,.5); transition:none; }
  .grid3 .pod:active{ transform:translateY(1px); }

  /* --- Lights: pod superior (selector / clave) --- */
  .game-panel{ width:fit-content; max-width:94%; margin:6px auto 0; padding:14px 16px 18px; box-sizing:border-box; display:flex; flex-direction:column; gap:14px; border:3px solid #b03020; border-radius:14px; background-color:#222; background-image:linear-gradient(rgba(0,0,0,.20),rgba(0,0,0,.28)),var(--mesh); background-size:cover; background-position:center; background-repeat:no-repeat; box-shadow:0 4px 12px rgba(0,0,0,.45); }
  .toppod{ display:flex; align-items:center; justify-content:center; position:relative; margin:0 auto; width:var(--pod-size); aspect-ratio:1; border-radius:50%; box-sizing:border-box; padding:0; border:none; cursor:pointer; -webkit-tap-highlight-color:transparent; background:var(--ring); box-shadow:0 3px 7px rgba(0,0,0,.5); transition: box-shadow .06s ease, transform .06s ease; }
  .toppod::before{ content:''; position:absolute; inset:4px; border-radius:50%; background:radial-gradient(circle at 35% 30%, #3a3a3a 0%, #1a1a1a 50%, #050505 100%); box-shadow:inset 0 2px 4px rgba(255,255,255,.22), inset 0 -3px 6px rgba(0,0,0,.6); transition: background .05s ease, box-shadow .05s ease; }
  .toppod.lit{ box-shadow:0 3px 7px rgba(0,0,0,.5); }
  .toppod.lit::before{ background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.30) 0%, rgba(255,255,255,0) 46%), radial-gradient(circle at 50% 82%, rgba(0,0,0,.40) 0%, rgba(0,0,0,0) 58%), var(--pod-color,#e23b2e); box-shadow:inset 0 2px 4px rgba(255,255,255,.28), inset 0 -3px 6px rgba(0,0,0,.5); }
  .toppod:active{ transform:translateY(1px); }
  .toppod-wrap{ position:relative; }

  /* --- Lights: overlay cuenta atras --- */
  .countdown{ display:none; position:absolute; inset:0; align-items:center; justify-content:center; background:rgba(0,0,0,.80); z-index:50; }
  .countdown.show{ display:flex; }
  .countdown-num{ color:#fff; font-weight:900; font-size:34vw; line-height:1; text-shadow:0 6px 18px rgba(0,0,0,.6); }

  /* --- Processing: zonas modo normal --- */
  #game .stat .v{color:var(--negro);font-size:24px;}
  #game .stat.main .v{color:var(--rojo);font-size:36px;}

  /* Cuenta atras */
  .count{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#fff;z-index:20;}
  .count.on{display:flex;}
  .count span{font-weight:800;font-size:120px;color:var(--rojo);}

  /* Resultado / fallo */
  .center-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:16px;background:#fff;text-align:center;}
  .res-unit{font-weight:700;letter-spacing:2px;text-transform:uppercase;font-size:13px;color:var(--azul);}
  .res-main{font-weight:800;font-size:64px;color:var(--rojo);line-height:.9;}
  .res-grid{display:flex;gap:10px;}
  .res-card{border:2px solid var(--borde);padding:8px 12px;min-width:86px;}
  .res-card .v{font-weight:800;font-size:22px;color:var(--negro);}
  .res-card .k{font-weight:700;letter-spacing:1px;text-transform:uppercase;font-size:10px;color:#888;}
  .fail-title{font-weight:800;font-size:46px;color:var(--rojo);text-transform:uppercase;line-height:.95;}
  .fail-msg{font-weight:600;font-size:16px;color:var(--negro);max-width:300px;}

  /* Ranking */
  .rank-body{flex:1;min-height:0;overflow-y:auto;padding:10px 14px;background:#fff;}
  .rank-title{text-align:center;font-weight:800;font-size:30px;text-transform:uppercase;margin-bottom:2px;}
  .rank-sub{text-align:center;font-weight:700;letter-spacing:2px;text-transform:uppercase;font-size:12px;color:var(--rojo);margin-bottom:10px;}
  .rank-row{display:grid;grid-template-columns:28px 1fr auto auto;gap:8px;align-items:center;padding:7px 4px;border-bottom:1px solid var(--seg);}
  .rank-row .pos{font-weight:800;color:var(--rojo);text-align:center;}
  .rank-row .nm{font-weight:700;letter-spacing:1px;text-transform:uppercase;}
  .rank-row .av{font-weight:800;color:var(--negro);}
  .rank-row .tt{font-weight:600;color:#888;font-size:12px;}
  .rank-empty{text-align:center;color:#999;font-weight:600;padding:20px;}
  .cnum{font-weight:800;font-size:46px;color:var(--rojo);line-height:1;}
  .result-body{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;align-items:center;gap:9px;padding:12px 14px;background:#fff;text-align:center;}
  .res-chart{width:100%;}
  .res-chart svg{width:100%;height:auto;display:block;}
  .save-row{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;margin-top:16px;}
  .save-row .btn-save,.save-row .btn-rank2{flex:none;width:min(280px,100%);}
  .btn-save{flex:1;height:var(--ah);background:var(--rojo);color:#fff;border:0;border-radius:0;font-family:inherit;font-weight:700;letter-spacing:1px;text-transform:uppercase;font-size:13px;cursor:pointer;}
  .btn-save:disabled{background:#9A9A9A;}
  .btn-rank2{flex:1;height:var(--ah);background:#fff;color:var(--rojo);border:2px solid var(--rojo);border-radius:0;font-family:inherit;font-weight:700;letter-spacing:1px;text-transform:uppercase;font-size:13px;cursor:pointer;}
  .libre-count{text-align:center;margin:10px 0 2px;}
  .libre-count .lc-k{font-weight:700;font-size:0.78rem;letter-spacing:0.08em;text-transform:uppercase;color:#9A9A9A;}
  .libre-count .lc-v{font-weight:800;font-size:2.3rem;line-height:1.05;color:var(--rojo);}
  .seg-sm button{font-size:12px;padding:7px 4px;letter-spacing:1px;}
  .rank-seg-label{text-align:center;font-weight:700;letter-spacing:2px;text-transform:uppercase;font-size:10px;color:#999;margin:6px 0 3px;}
  .rank-screen-title { font-size:1.2rem; font-weight:900; letter-spacing:0.1em; text-transform:uppercase; color:#111; text-align:center; background:#fff; padding:9px 14px 7px; border-bottom:3px solid #b03020; margin-bottom:10px; }
  .rank-tabs { display:flex; margin-bottom:0; margin-top:0; }
  .rank-tab { flex:1; padding:5px 4px; font-size:0.58rem; letter-spacing:0.06em; text-align:center; cursor:pointer; color:#999; font-weight:700; text-transform:uppercase; background:#fff; border:1px solid #000; border-right:none; }
  .rank-tab:last-child { border-right:1px solid #000; }
  .rank-tab.sel { color:#fff; background:#b03020; border-color:#000; }
  .rank-full-list { background:#fff; }
  .rank-full-row { display:flex; align-items:center; gap:8px; padding:5px 14px; border-bottom:1px solid #f0f0f0; }
  .rank-full-row.rank-full-me { background:#fff2ee; box-shadow:inset 3px 0 0 #b03020; }
  .rank-full-row.rank-full-me .rank-full-name { color:#b03020; font-weight:900; }
  .rank-full-pos { font-size:0.72rem; font-weight:900; color:#ccc; width:22px; }
  .rank-full-pos.gold { color:#c9a227; }
  .rank-full-pos.silver { color:#8e9eab; }
  .rank-full-pos.bronze { color:#c07941; }
  .rank-full-name { flex:1; font-size:0.72rem; font-weight:700; color:#111; }
  .rank-full-ms { font-size:0.72rem; font-weight:900; color:#b03020; }
  .rank-full-date { font-size:0.5rem; color:#ccc; }
  .rank-full-empty { text-align:center; padding:24px; font-size:0.62rem; color:#ccc; letter-spacing:0.1em; }
  #segModoR,#segEstR,#segEnsR{margin-bottom:4px;}
  #rkList{margin-top:10px;}
  .res-quad{width:100%;height:clamp(200px,27svh,238px);display:grid;grid-template-columns:1.28fr 1fr;grid-template-rows:1.62fr 1fr;}
  .rq{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:6px 8px;gap:2px;min-width:0;min-height:0;}
  .rq:nth-child(1){border-right:3px solid var(--rojo);border-bottom:3px solid var(--rojo);}
  .rq:nth-child(2){border-bottom:3px solid var(--rojo);}
  .rq:nth-child(3){border-right:3px solid var(--rojo);}
  .rq-k{font-weight:700;letter-spacing:1px;text-transform:uppercase;font-size:10px;color:#9A9A9A;}
  .rq-v{font-weight:800;font-size:34px;line-height:1;color:var(--negro);}
  .rq-media .rq-main{font-weight:800;font-size:46px;line-height:1;color:var(--rojo);}
  @keyframes blinkop{0%,100%{opacity:1}50%{opacity:.2}}
  .blink{animation:blinkop .9s ease-in-out infinite;}
  .start-wrap { display:flex; width:fit-content; align-items:center; justify-content:center; padding:4px; margin:5px auto 3px; border-radius:50%; background:conic-gradient(#ffffff,#9a9a9a,#e8e8e8,#5a5a5a,#ffffff,#8a8a8a,#dcdcdc,#666666,#ffffff); box-shadow:0 5px 12px rgba(0,0,0,0.6); transition:transform 0.08s, box-shadow 0.08s; }
  .start-wrap:active { transform:translateY(3px); box-shadow:0 2px 6px rgba(0,0,0,0.6); }
  .start-btn { width:70px; height:70px; border-radius:50%; background:radial-gradient(circle at 35% 30%, #e84030 0%, #b03020 45%, #7a1a10 100%); border:none; color:#fff; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif; font-weight:900; font-size:0.6rem; letter-spacing:0.18em; text-transform:uppercase; cursor:pointer; position:relative; box-shadow:inset 0 2px 4px rgba(255,255,255,0.28), inset 0 -3px 6px rgba(0,0,0,0.5); transition:transform 0.08s; }
  .start-btn:active { box-shadow:inset 0 3px 7px rgba(0,0,0,0.6); }
  .start-btn.libre-btn{ background:radial-gradient(circle at 35% 30%, #555 0%, #222 45%, #000 100%); }
  .start-btn.libre-btn.armed{ background:radial-gradient(circle at 35% 30%, #e84030 0%, #b03020 45%, #7a1a10 100%); }
  #user-name-bar { width:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 0 5px; box-sizing:border-box; gap:0; }

  /* Overlay "Ejercicio finalizado" (modal a pantalla completa, 1s antes de resultados) */
  #transition-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:#111; z-index:9999; align-items:center; justify-content:center; flex-direction:column; }
  #transition-overlay.active { display:flex; }
  #transition-text { color:#fff; font-size:1.6rem; font-weight:900; font-family:Arial,sans-serif; letter-spacing:0.05em; text-align:center; text-transform:uppercase; border-top:4px solid #b03020; border-bottom:4px solid #b03020; padding:16px 30px; }
</style>

<script>
"use strict";
var SYMS = [["circle","cross"],["circle","dot"],["circle","hline"],["circle","vline"],["circle","concentric"],["circle","twodots"],["octagon","cross"],["octagon","dot"],["octagon","hline"],["octagon","vline"],["octagon","concentric"],["octagon","twodots"],["diamond","innershape"],["diamond","dot"],["diamond","hline"],["diamond","vline"],["diamond","diag"],["diamond","diag2"],["diamond","concentric"],["diamond","twodots"],["tri_up","innershape"],["tri_up","dot"],["tri_up","hline"],["tri_up","vline"],["tri_up","diag"],["tri_up","concentric"],["tri_up","twodots"],["hexagon","cross"],["hexagon","dot"],["hexagon","hline"],["hexagon","vline"],["hexagon","diag"],["hexagon","concentric"],["hexagon","twodots"],["trapezoid","innershape"],["trapezoid","dot"],["trapezoid","hline"],["trapezoid","vline"],["trapezoid","diag"],["trapezoid","diag2"],["trapezoid","concentric"],["trapezoid","twodots"],["parallel","innershape"],["parallel","dot"],["parallel","hline"],["parallel","vline"],["parallel","diag"],["parallel","diag2"],["parallel","concentric"],["parallel","twodots"]];
var SWG=4.5;

function $(id){ return document.getElementById(id); }
function show(id){ var s=document.querySelectorAll('.screen'); for(var i=0;i<s.length;i++) s[i].classList.remove('active'); $(id).classList.add('active'); }
function two(n){ return (n<10?'0':'')+n; }
function pad3(n){ return (n<10?'00':(n<100?'0':''))+n; }
function fmtChrono2(ms){ if(ms<0)ms=0; var m=Math.floor(ms/60000), sec=Math.floor((ms%60000)/1000), mm=Math.floor(ms%1000); return two(m)+':'+two(sec)+'.'+pad3(mm); }
function fmtTime(ms){ var cs=Math.floor(ms/10), cc=cs%100, s=Math.floor(cs/100), sec=s%60, m=Math.floor(s/60); return m+':'+two(sec)+'.'+two(cc); }
function fmtDate(ts){ if(!ts) return ''; var d=new Date(ts); return two(d.getDate())+'/'+two(d.getMonth()+1); }
function fmtRT(ms){ return (ms/1000).toFixed(2); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

var AC=null;
function audioCtx(){
  try{
    if(!AC){ AC=new (window.AudioContext||window.webkitAudioContext)(); }
    if(AC.state==='suspended'){ AC.resume(); }
  }catch(e){ AC=null; }
  return AC;
}
function tone(type,f0,f1,start,dur,vol){
  var ctx=AC; if(!ctx) return;
  var o=ctx.createOscillator(), g=ctx.createGain();
  o.type=type; o.frequency.setValueAtTime(f0,start);
  if(f1){ o.frequency.exponentialRampToValueAtTime(f1,start+dur); }
  g.gain.setValueAtTime(0.0001,start);
  g.gain.exponentialRampToValueAtTime(vol,start+0.006);
  g.gain.exponentialRampToValueAtTime(0.0001,start+dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(start); o.stop(start+dur+0.03);
}
function sndButton(){ var c=audioCtx(); if(!c) return; tone('triangle',520,0,c.currentTime,0.055,0.16); }
function sndSymbol(){ var c=audioCtx(); if(!c) return; tone('sine',780,940,c.currentTime,0.085,0.20); }
function sndFail(){ var c=audioCtx(); if(!c) return; var t=c.currentTime; tone('square',196,0,t,0.14,0.17); tone('square',146,0,t+0.13,0.20,0.17); }


function seg(id){
  var box=$(id);
  box.addEventListener('click', function(e){
    var b=e.target.closest('button'); if(!b) return;
    var all=box.querySelectorAll('button');
    for(var i=0;i<all.length;i++) all[i].classList.remove('sel');
    b.classList.add('sel');
    if(id==='segModo') updateModeUI();
  });
}
function updateModeUI(){
  var mode=selVal('segModo')||'normal';
  var est=$('segEstimulo'), ens=$('segEnsayos'), md=$('segModo');
  if(mode==='limite'){ setSeg('segEstimulo','cambia'); }
  var armed=S.libreArmed;
  if(md){ md.classList.toggle('seg-dim', armed); }
  if(est){ est.classList.toggle('seg-dim', armed || mode==='limite'); }
  if(ens){ ens.classList.toggle('seg-dim', armed); }
}
function toggleLibreArm(){
  S.libreArmed=!S.libreArmed;
  var btn=$('btn-libre'); if(btn) btn.classList.toggle('armed', S.libreArmed);
  updateModeUI();
}
function selVal(id){ var b=$(id).querySelector('button.sel'); return b?b.getAttribute('data-v'):null; }

var S={mode:'normal',stim:'cambia',total:15,name:'RDS',sport:'',
  color:'#e23b2e',lastColor:'#e23b2e',
  seq:[],idx:0,trial:0,times:[],podColors:[],
  running:false,lock:true,armed:false,stimVisible:false,
  t0:0,trialT0:0,countIv:0,coverTo:0,limitTo:0,deadline:0,resEnsayos:0};
var RT_CORR=30; /* correccion latencia tactil (ms), igual que Reaction Speed */
var LIBRE_MODOS=['3 pods','6 pods','9 pods','9 Colors','9 Colors Mix','2 pods'];
S.free={sel:'tiempo',tiempo:0,ensayos:0,espera:0,modo:0};
S.libre=false; S.byTime=false; S.podSet=null; S.waitMin=0; S.waitMax=0; S.timeLimit=0; S.reshuffle=false; S.libreArmed=false; S.waiting=false;

function filterInitials(el){ el.value=el.value.replace(/[^A-Za-z]/g,'').toUpperCase(); }
/* === Lights: helpers de pods y pantalla === */
function lightPod(i,color){ var p=$('pod'+i); if(!p) return; p.style.setProperty('--pod-color',color); p.classList.add('lit'); }
function clearPod(i){ var p=$('pod'+i); if(!p) return; p.classList.remove('lit'); p.style.removeProperty('--pod-color'); }
function clearAllPods(){ for(var i=0;i<9;i++) clearPod(i); }
function setTopPod(color){ var t=$('topPod'); if(!t) return; if(color){ t.style.setProperty('--pod-color',color); t.classList.add('lit'); } else { t.classList.remove('lit'); t.style.removeProperty('--pod-color'); } }
function closePalette(){ var p=$('palette'); if(p) p.classList.remove('open'); }
function hideCountdown(){ var c=$('countdown'); if(c) c.classList.remove('show'); }
function clearTimers(){ if(S.countIv){clearInterval(S.countIv);S.countIv=0;} if(S.coverTo){clearTimeout(S.coverTo);S.coverTo=0;} if(S.limitTo){clearInterval(S.limitTo);clearTimeout(S.limitTo);S.limitTo=0;} if(S.chronoIv){clearInterval(S.chronoIv);S.chronoIv=0;} }
function tickChrono(){ if($('stChrono')) $('stChrono').textContent=fmtChrono2(performance.now()-S.t0); }
function resetGameStats(){ if($('stLast'))$('stLast').textContent='--'; if($('stAvg'))$('stAvg').textContent='--'; if($('stChrono'))$('stChrono').textContent='00:00.000'; if($('prog'))$('prog').style.width='0%'; if($('trialCount'))$('trialCount').textContent=(S.byTime?(S.timeLimit+'s'):('1/'+S.total)); }

/* === Lights: entrada al ejercicio (START del home) === */
function libreRender(){
  var f=S.free;
  if($('lvTiempo')) $('lvTiempo').textContent=f.tiempo+' s';
  if($('lvEnsayos')) $('lvEnsayos').textContent=String(f.ensayos);
  if($('lvEspera')) $('lvEspera').textContent=String(f.espera);
  if($('lvModo')) $('lvModo').textContent=LIBRE_MODOS[f.modo];
  var rows=document.querySelectorAll('#libre .libre-row');
  for(var i=0;i<rows.length;i++){ rows[i].classList.toggle('sel', rows[i].getAttribute('data-p')===f.sel); }
  var canStart=(f.tiempo>0||f.ensayos>0);
  var st=$('lbStart'); if(st) st.classList.toggle('disabled', !canStart);
}
function libreSelect(p){ S.free.sel=p; libreRender(); }
function libreAdjust(dir){
  var f=S.free;
  if(f.sel==='tiempo'){ f.tiempo=Math.min(120,Math.max(0,f.tiempo+dir*5)); if(f.tiempo>0) f.ensayos=0; }
  else if(f.sel==='ensayos'){ f.ensayos=Math.min(100,Math.max(0,f.ensayos+dir*5)); if(f.ensayos>0) f.tiempo=0; }
  else if(f.sel==='espera'){ f.espera=Math.min(2,Math.max(0,f.espera+dir)); }
  else if(f.sel==='modo'){ f.modo=Math.min(LIBRE_MODOS.length-1,Math.max(0,f.modo+dir)); }
  libreRender();
}
function libreInit(){
  var rows=document.querySelectorAll('#libre .libre-row');
  for(var i=0;i<rows.length;i++){ (function(r){ r.addEventListener('click', function(){ libreSelect(r.getAttribute('data-p')); }); })(rows[i]); }
  var m=$('lbMinus'), pl=$('lbPlus');
  if(m) m.addEventListener('click', function(){ libreAdjust(-1); });
  if(pl) pl.addEventListener('click', function(){ libreAdjust(1); });
  var st=$('lbStart'); if(st) st.addEventListener('click', libreStart);
}
function libreStart(){
  var f=S.free;
  if(f.tiempo<=0 && f.ensayos<=0) return;
  var label=LIBRE_MODOS[f.modo], eng, podSet=null, reshuffle=false;
  if(label==='3 pods'){ eng='normal'; podSet=[3,4,5]; }
  else if(label==='6 pods'){ eng='normal'; podSet=[0,1,2,3,4,5]; }
  else if(label==='9 pods'){ eng='normal'; podSet=null; }
  else if(label==='9 Colors'){ eng='extremo'; }
  else if(label==='9 Colors Mix'){ eng='extremo'; reshuffle=true; }
  else if(label==='2 pods'){ eng='2pods'; }
  else { return; }
  if(f.espera<=0){ S.waitMin=0; S.waitMax=0; }
  else if(f.espera===1){ S.waitMin=500; S.waitMax=1000; }
  else { S.waitMin=500; S.waitMax=2000; }
  S.byTime=(f.tiempo>0);
  if(S.byTime){ S.timeLimit=f.tiempo; S.total=999999; }
  else { S.timeLimit=0; S.total=f.ensayos; }
  S.libre=true; S.mode=eng; S.podSet=podSet; S.reshuffle=reshuffle;
  S.stim=(S.waitMax>0?'fijo':'cambia');
  S.name='RDS'; S.sport='';
  S.seq=[]; S.idx=0; S.trial=0; S.times=[]; S.podColors=[];
  S.running=false; S.lock=true; S.armed=false; S.stimVisible=false;
  S.resEnsayos=0; S.deadline=0;
  clearTimers(); clearAllPods(); closePalette(); hideCountdown(); resetGameStats();
  if(eng==='normal'){ S.color=POD_RED; setTopPod(POD_RED); } else { setTopPod(null); }
  show('game');
  beginRun();
}
function openLibre(){ libreRender(); show('libre'); }
function enterGame(){
  S.mode=selVal('segModo')||'normal';
  if(S.libreArmed){ openLibre(); return; }
  S.stim=selVal('segEstimulo')||'cambia';
  S.total=parseInt(selVal('segEnsayos')||'15',10);
  S.libre=false; S.byTime=false; S.podSet=null; S.reshuffle=false; S.timeLimit=0;
  if(S.stim==='fijo'){ S.waitMin=500; S.waitMax=4000; } else { S.waitMin=0; S.waitMax=0; }
  var nm=($('user-ini-input').value||'RDS').toUpperCase().replace(/[^A-Z]/g,'').slice(0,3);
  S.name=nm||'RDS';
  S.sport=($('user-sport-select')&&$('user-sport-select').value)||'';
  // reset de partida
  S.seq=[]; S.idx=0; S.trial=0; S.times=[]; S.podColors=[];
  S.running=false; S.lock=true; S.armed=false; S.stimVisible=false;
  S.resEnsayos=0; S.deadline=0;
  clearTimers();
  // pantalla de juego en espera
  clearAllPods(); closePalette(); hideCountdown(); resetGameStats();
  if(S.mode==='normal'){ S.color=POD_RED; setTopPod(POD_RED); }
  else { setTopPod(null); }
  show('game');
  beginRun();
}

/* === Lights: arranque de la partida (START del juego) === */
function beginRun(){
  if(S.running) return;
  closePalette();
  runCountdown(function(){ startTrials(); });
}
function runCountdown(cb){
  var c=$('countdown'), num=$('countdownNum');
  if(!c||!num){ cb(); return; }
  S.lock=true; clearTimers();
  c.classList.add('show');
  function step(k){
    if(k<=0){ c.classList.remove('show'); S.coverTo=0; cb(); return; }
    num.textContent=String(k);
    S.coverTo=setTimeout(function(){ step(k-1); }, 800);
  }
  step(3);
}
/* === Lights: arranque de los ensayos === */
function startTrials(){
  S.running=true; S.lock=false; S.armed=false;
  S.trial=0; S.times=[]; S.target=-1;
  S.t0=performance.now();
  S.chronoIv=setInterval(tickChrono,43);
  if($('prog')) $('prog').style.width='0%';
  S.waiting=false;
  if(S.libre && S.byTime){ startLibreClock(); }
  if(S.mode==='normal'){ normalNext(); }
  else if(S.mode==='extremo'){ startExtremo(); }
  else if(S.mode==='limite'){ startLimite(); }
  else if(S.mode==='2pods'){ twoStart(); }
}
function startLibreClock(){
  S.deadline=performance.now()+S.timeLimit*1000;
  S.limitTo=setInterval(function(){
    var rem=S.deadline-performance.now();
    if(rem<=0){ S.armed=false; clearTimers(); clearAllPods(); setTopPod(null); endRun(); return; }
    var frac=1-(rem/(S.timeLimit*1000));
    if($('prog')) $('prog').style.width=(Math.max(0,Math.min(1,frac))*100)+'%';
    if($('trialCount')) $('trialCount').textContent=Math.ceil(rem/1000)+'s';
  },100);
}

/* elige un indice 0-8 distinto del anterior */
function pickIndex(prev){
  var set=(S.podSet&&S.podSet.length)?S.podSet:[0,1,2,3,4,5,6,7,8];
  if(set.length===1) return set[0];
  var i; do{ i=set[Math.floor(Math.random()*set.length)]; }while(i===prev);
  return i;
}

/* === Modo Normal === */
function normalNext(){
  if(S.trial>=S.total){ endRun(); return; }
  var i=pickIndex(S.target); S.target=i; S.waiting=false;
  clearAllPods(); lightPod(i,S.color);
  if(!S.byTime && $('trialCount')) $('trialCount').textContent=(S.trial+1)+'/'+S.total;
  S.trialT0=performance.now(); S.armed=true;
}

/* === Modo Extremo === */
var PALETTE=['#f2cf1b','#e23b2e','#a8e87a','#2b6fe0','#f2f2f2','#f07d1a','#ffb1a9','#1f8237','#4fc3f7']; /* orden = pod0..8 (fijo en Extremo; barajado en Limite) */
function paletteColors(){ return PALETTE.slice(); }
var TWO_PAIRS=[{dark:'#e23b2e',light:'#ffb1a9'},{dark:'#1f8237',light:'#a8e87a'},{dark:'#2b6fe0',light:'#4fc3f7'}];
function twoStart(){ twoNext(); }
function twoNext(){
  if(!S.byTime && S.trial>=S.total){ endRun(); return; }
  clearAllPods();
  S.waiting=false;
  var pair=TWO_PAIRS[Math.floor(Math.random()*TWO_PAIRS.length)];
  var a=Math.floor(Math.random()*9), bb;
  do{ bb=Math.floor(Math.random()*9); }while(bb===a);
  if(Math.random()<0.5){ S.twoDarkPos=a; lightPod(a,pair.dark); lightPod(bb,pair.light); }
  else { S.twoDarkPos=bb; lightPod(bb,pair.dark); lightPod(a,pair.light); }
  setTopPod(pair.dark);
  if(!S.byTime && $('trialCount')) $('trialCount').textContent=(S.trial+1)+'/'+S.total;
  S.trialT0=performance.now(); S.armed=true;
}
function startExtremo(){
  S.podColors=paletteColors();
  for(var i=0;i<9;i++) lightPod(i,S.podColors[i]);
  setTopPod(null); S.lastTgt=null; S.tgtStreak=0;
  extremoNext();
}
function pickColorTarget(){
  var colors=S.podColors, c;
  do { c=colors[Math.floor(Math.random()*colors.length)]; } while(c===S.lastTgt && S.tgtStreak>=3);
  if(c===S.lastTgt){ S.tgtStreak++; } else { S.lastTgt=c; S.tgtStreak=1; }
  return c;
}
function extremoNext(){
  if(S.trial>=S.total){ endRun(); return; }
  if(S.reshuffle){ S.podColors=shuffleArr(S.podColors); for(var k=0;k<9;k++) lightPod(k,S.podColors[k]); }
  S.tgtColor=pickColorTarget();
  setTopPod(S.tgtColor);
  if(!S.byTime && $('trialCount')) $('trialCount').textContent=(S.trial+1)+'/'+S.total;
  S.trialT0=performance.now(); S.armed=true;
}

/* === Modo Limite === */
function startLimite(){
  S.stim='cambia';                                  // siempre sin espera
  S.podColors=shuffleArr(paletteColors());
  for(var i=0;i<9;i++) lightPod(i,S.podColors[i]);
  setTopPod(null); S.lastTgt=null; S.tgtStreak=0;
  S.deadline=performance.now()+S.total*1000;        // total = segundos
  S.limitTo=setInterval(limTick,100);
  limiteShow(false);
}
function limiteShow(reshuffle){
  if(reshuffle){ S.podColors=shuffleArr(S.podColors); for(var i=0;i<9;i++) lightPod(i,S.podColors[i]); }
  S.tgtColor=pickColorTarget();
  setTopPod(S.tgtColor);
  S.trialT0=performance.now(); S.armed=true;
}
function limTick(){
  var rem=S.deadline-performance.now();
  if(rem<=0){ finishLimiteRun(); return; }
  var frac=1-(rem/(S.total*1000));
  if($('prog')) $('prog').style.width=(Math.max(0,Math.min(1,frac))*100)+'%';
  if($('trialCount')) $('trialCount').textContent=Math.ceil(rem/1000)+'s';
}
function finishLimiteRun(){
  S.running=false; S.lock=true; S.armed=false;
  clearTimers(); clearAllPods(); setTopPod(null);
  finishLimite('done');
}

/* toque sobre la rejilla (delegacion) */
function onGridTap(e){
  if(!S.running||S.lock) return;
  var idxs=[], outside=false;
  var list=(e.touches&&e.touches.length)?e.touches:(e.changedTouches||null);
  if(list&&list.length){
    for(var t=0;t<list.length;t++){
      var el=list[t].target, pod=(el&&el.closest)?el.closest('.pod'):null;
      if(pod){ var ix=parseInt(pod.getAttribute('data-i'),10); if(idxs.indexOf(ix)<0) idxs.push(ix); }
      else outside=true;
    }
  } else {
    var p2=(e.target&&e.target.closest)?e.target.closest('.pod'):null;
    if(p2) idxs.push(parseInt(p2.getAttribute('data-i'),10)); else outside=true;
  }
  handleTouches(idxs, outside);
}
function handleTouches(idxs, outside){
  var penaliza=(S.mode==='normal'||S.mode==='2pods');
  if(!S.armed){
    if(penaliza && S.waiting && idxs.length){ failRun('Error, has pulsado antes de tiempo.'); }
    return;                                     // fuera del hueco no penaliza (otros modos)
  }
  if(idxs.length===0){ if(outside) sndOutside(); return; }
  if(penaliza && idxs.length>1){ failRun('Error, has pulsado m\u00e1s de un pod.'); return; }
  handleTap(idxs[0]);
}
function handleTap(i){
  if(!S.armed) return;                          // durante el hueco no penaliza
  if(S.mode==='normal'){
    if(i===S.target){
      var rt=Math.max(0,performance.now()-S.trialT0-RT_CORR);
      S.armed=false; S.times.push(rt); S.trial++;
      clearPod(i); updateLiveStats(rt); if(!S.byTime) setProgress(S.trial/S.total);
      if(!S.byTime && S.trial>=S.total){ endRun(); return; }
      if(S.stim==='fijo'){ S.waiting=true; clearAllPods(); S.coverTo=setTimeout(normalNext, S.waitMin+Math.random()*(S.waitMax-S.waitMin)); }
      else { normalNext(); }
    } else { failRun('Error, te has equivocado de pod.'); }   // Normal: pod erroneo -> fin
  } else if(S.mode==='extremo'){
    if(S.podColors[i]===S.tgtColor){
      var rt2=Math.max(0,performance.now()-S.trialT0-RT_CORR);
      S.armed=false; S.times.push(rt2); S.trial++;
      updateLiveStats(rt2); if(!S.byTime) setProgress(S.trial/S.total);
      if(!S.byTime && S.trial>=S.total){ endRun(); return; }
      if(S.stim==='fijo'){ setTopPod(null); S.coverTo=setTimeout(extremoNext, S.waitMin+Math.random()*(S.waitMax-S.waitMin)); }
      else { extremoNext(); }
    } else { failRun(); }                        // color equivocado -> fin
  } else if(S.mode==='limite'){
    if(S.podColors[i]===S.tgtColor){
      var rt3=Math.max(0,performance.now()-S.trialT0-RT_CORR);
      S.armed=false; S.times.push(rt3); S.trial++;
      updateLiveStats(rt3);
      limiteShow(true);                          // baraja + nuevo objetivo (sin espera)
    } else { failRun(); }                        // color equivocado -> fin
  } else if(S.mode==='2pods'){
    if(i===S.twoDarkPos){
      var rt4=Math.max(0,performance.now()-S.trialT0-RT_CORR);
      S.armed=false; S.times.push(rt4); S.trial++;
      clearPod(i); updateLiveStats(rt4); if(!S.byTime) setProgress(S.trial/S.total);
      if(!S.byTime && S.trial>=S.total){ endRun(); return; }
      if(S.stim==='fijo'){ S.waiting=true; clearAllPods(); setTopPod(null); S.coverTo=setTimeout(twoNext, S.waitMin+Math.random()*(S.waitMax-S.waitMin)); }
      else { twoNext(); }
    } else { failRun('Error, te has equivocado de pod.'); }   // claro u otro -> fin
  }
}

function setProgress(frac){ $('prog').style.width=(Math.max(0,Math.min(1,frac))*100)+'%'; }

function calc(){
  var n=S.times.length, sum=0, best=Infinity, worst=0;
  for(var i=0;i<n;i++){ sum+=S.times[i]; if(S.times[i]<best) best=S.times[i]; if(S.times[i]>worst) worst=S.times[i]; }
  return {n:n, sum:sum, avg:n?sum/n:0, best:best===Infinity?0:best, worst:worst};
}

function renderChart(times){
  var box=$('resChart'); if(!box) return;
  var n=times.length; if(n===0){ box.innerHTML=''; return; }
  var W=320,H=132,padL=12,padR=12,padT=12,padB=22;
  var min=Math.min.apply(null,times), max=Math.max.apply(null,times), span=(max-min)||1;
  var pw=W-padL-padR, ph=H-padT-padB, base=padT+ph, i;
  function X(i){ return n===1?padL+pw/2:padL+(i/(n-1))*pw; }
  function Y(v){ return padT+(1-(v-min)/span)*ph; }
  var pts=[]; for(i=0;i<n;i++){ pts.push([X(i),Y(times[i])]); }
  var area='M '+pts[0][0].toFixed(1)+' '+base.toFixed(1);
  for(i=0;i<n;i++){ area+=' L '+pts[i][0].toFixed(1)+' '+pts[i][1].toFixed(1); }
  area+=' L '+pts[n-1][0].toFixed(1)+' '+base.toFixed(1)+' Z';
  var poly=''; for(i=0;i<n;i++){ poly+=(i?' ':'')+pts[i][0].toFixed(1)+','+pts[i][1].toFixed(1); }
  var s='<svg viewBox="0 0 '+W+' '+H+'">';
  s+='<path d="'+area+'" fill="rgba(162,58,41,0.10)" stroke="none"/>';
  s+='<polyline points="'+poly+'" fill="none" stroke="#A23A29" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  var step=n<=12?1:5;
  for(i=0;i<n;i++){
    if(i===0||i===n-1||((i+1)%step)===0){
      s+='<text x="'+pts[i][0].toFixed(1)+'" y="'+(H-7)+'" text-anchor="middle" font-family="Arial" font-size="9" fill="#9A9A9A">'+(i+1)+'</text>';
    }
  }
  box.innerHTML=s+'</svg>';
}

function finish(){
  S.running=false;

  var total=performance.now()-S.t0, c=calc();
  $('rAvg').textContent=Math.round(c.avg)+' ms';
  $('rTime').textContent=fmtChrono2(total);
  $('rBest').textContent=Math.round(c.best)+' ms';
  $('rWorst').textContent=Math.round(c.worst)+' ms';
  S.resAvg=c.avg; S.resTotal=total; S.resEnsayos=c.n; S.saved=false;

  showSaveScreen();
}

function finishLimite(kind){

}

function lbKey(mode,stim,total){ return 'rds_lst_'+mode+'_'+stim+'_'+total; }
function loadLb(k){ try{ return JSON.parse(localStorage.getItem(k)||'[]'); }catch(e){ return []; } }
function sortLb(lb,mode){
  if(mode==='limite'){ lb.sort(function(a,b){ return (b.ensayos-a.ensayos)||(a.avg-b.avg); }); }
  else { lb.sort(function(a,b){ return a.avg-b.avg; }); }
}
function saveScore(avg,total){

  lb.push(rec); sortLb(lb,S.mode); lb=lb.slice(0,50);

function toggleHideRepeated(){

function filterRepeated(list){
  var max=hideRepeated?1:3;
  var seen={}, result=[];
  for(var i=0;i<list.length;i++){
    var name=(list[i].name||'').toLowerCase().trim();
    var c=seen[name]||0;
    if(c<max){ seen[name]=c+1; result.push(list[i]); }
  }
  return result;
}

function getHomeName(){

  var nm=((iniEl.value||'RDS').toUpperCase().replace(/[^A-Z]/g,'').slice(0,3))||'RDS';
  var sport=(sptEl.value||'').trim().toUpperCase();
  return sport ? (nm+'-'+sport) : nm;
}

function renderRankList(list, el, m){
  list=filterRepeated(list);
  var medals=['gold','silver','bronze'];
  var meName=getHomeName();
  var myIdx=-1, myEntry=null;
  if(meName){
    for(var k=0;k<list.length;k++){
      if((list[k].name||'').trim().toUpperCase()===meName){ myIdx=k; myEntry=list[k]; break; }
    }
  }
  el.innerHTML='';
  var display=list.slice(0,15);
  if(!display.length){
    var d=document.createElement('div');d.className='rank-full-empty';
    d.textContent='Sin resultados';el.appendChild(d);return;
  }
  function buildRow(entry, posLabel, medalIdx, isMe){
    var row=document.createElement('div');row.className='rank-full-row'+(isMe?' rank-full-me':'');
    var pos=document.createElement('div');
    pos.className='rank-full-pos'+(medalIdx>=0 && medalIdx<3?' '+medals[medalIdx]:'');
    pos.textContent=posLabel;
    var nm=document.createElement('div');nm.className='rank-full-name';nm.textContent=entry.name;
    var ms=document.createElement('div');ms.className='rank-full-ms';
    ms.textContent=(m==='limite') ? ((entry.ensayos||0)+'/'+entry.avg) : (entry.avg+' ms');
    var dt=document.createElement('div');dt.className='rank-full-date';dt.textContent=entry.ts?fmtDate(entry.ts):'';
    row.appendChild(pos);row.appendChild(nm);row.appendChild(ms);row.appendChild(dt);
    return row;
  }
  for(var i=0;i<display.length;i++){
    var rowName=(display[i].name||'').trim().toUpperCase();
    var isMe=meName && rowName===meName;
    el.appendChild(buildRow(display[i], (i+1), i, isMe));
  }
  if(myEntry && myIdx>=15){
    var posLabel=(myIdx+1>=100)?'100+':String(myIdx+1);
    el.appendChild(buildRow(myEntry, posLabel, -1, true));
  }
}

function renderRank(mode,stim,total){
